<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система REFER — Покрокова Активація</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #22d3ee;
            --gold: #fbbf24;
            --green: #10b981;
            --text: #f8fafc;
            --border: #1e293b;
            --locked: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
        .container { width: 100%; max-width: 550px; background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 30px; }

        .header { text-align: center; margin-bottom: 25px; }
        .header span { color: var(--accent); }

        .profit-card {
            background: linear-gradient(135deg, rgba(34, 211, 238, 0.1), rgba(16, 185, 129, 0.1));
            border: 1px solid var(--accent);
            border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 25px;
        }
        .profit-card h2 { color: var(--gold); }

        /* Стилі карток */
        .bank-box {
            background: #1e293b;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid transparent;
            position: relative;
            overflow: hidden;
            transition: 0.4s;
        }

        /* Стиль для заблокованого банку */
        .bank-box.is-locked {
            opacity: 0.6;
            border-color: var(--green);
            background: rgba(16, 185, 129, 0.05);
            pointer-events: none;
        }

        .bank-box.is-locked::after {
            content: "✅ АКТИВОВАНО";
            position: absolute;
            top: 10px; right: 10px;
            background: var(--green);
            color: white;
            font-size: 10px; font-weight: 900;
            padding: 4px 8px; border-radius: 6px;
        }

        .bank-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .bank-name { font-weight: 800; }
        .bank-badge { background: var(--gold); color: #000; padding: 2px 10px; border-radius: 50px; font-size: 12px; font-weight: 900; }

        .btn {
            display: block; width: 100%; padding: 14px; border: none; border-radius: 12px;
            font-weight: 800; cursor: pointer; text-decoration: none; text-align: center; transition: 0.3s;
        }
        .btn-my-link { background: var(--accent); color: #020617; }
        .btn-activate { background: var(--green); color: #fff; margin-top: 10px; }

        .activation-area { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #334155; display: none; }

        input {
            width: 100%; padding: 12px; background: #020617; border: 1px solid #334155;
            border-radius: 10px; color: #fff; margin-bottom: 10px; outline: none;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>Коаліція <span>REFER</span></h1></div>

    <div class="profit-card">
        <p>Ваш прибуток за всі банки</p>
        <h2>1000 ГРН БОНУСАМИ</h2>
    </div>

    <div id="banks-container">
        <div class="bank-box" id="box-raiffeisen">
            <div class="bank-meta"><span class="bank-name">Raiffeisen</span><span class="bank-badge">300 ГРН</span></div>
            <a href="https://mrf-static.apps.raiffeisen.ua/v1/member-get-member?adj_t=1s492itc_1szn7s6p&ref_id=13251364" 
               target="_blank" class="btn btn-my-link" onclick="unlockInput('raiffeisen')">1. ЗАРЕЄСТРУВАТИСЯ</a>
            <div class="activation-area" id="area-raiffeisen">
                <input type="text" id="input-raiffeisen" placeholder="Вставте ВАШЕ посилання">
                <button class="btn btn-activate" onclick="submitToFirebase('raiffeisen')">2. АКТИВУВАТИ</button>
            </div>
        </div>

        <div class="bank-box" id="box-alliance">
            <div class="bank-meta"><span class="bank-name">Alliance Bank</span><span class="bank-badge">300 ГРН</span></div>
            <a href="https://alb.ua/r/-0VuEwA" target="_blank" class="btn btn-my-link" onclick="unlockInput('alliance')">1. ЗАРЕЄСТРУВАТИСЯ</a>
            <div class="activation-area" id="area-alliance">
                <input type="text" id="input-alliance" placeholder="Вставте ВАШЕ посилання">
                <button class="btn btn-activate" onclick="submitToFirebase('alliance')">2. АКТИВУВАТИ</button>
            </div>
        </div>

        <div class="bank-box" id="box-izibank">
            <div class="bank-meta"><span class="bank-name">izibank</span><span class="bank-badge">150 ГРН</span></div>
            <a href="https://izibank.com.ua/r/pB6P" target="_blank" class="btn btn-my-link" onclick="unlockInput('izibank')">1. ЗАРЕЄСТРУВАТИСЯ</a>
            <div class="activation-area" id="area-izibank">
                <input type="text" id="input-izibank" placeholder="Вставте ВАШЕ посилання">
                <button class="btn btn-activate" onclick="submitToFirebase('izibank')">2. АКТИВУВАТИ</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCu-Wx23P4OpxUbSBywpdiETZHbOe08z9c",
        authDomain: "refer-c9d1b.firebaseapp.com",
        databaseURL: "https://refer-c9d1b-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "refer-c9d1b",
        storageBucket: "refer-c9d1b.firebasestorage.app",
        messagingSenderId: "552445924289",
        appId: "1:552445924289:web:3efe63c023a17078659540"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ПЕРЕВІРКА СТАНУ ПРИ ЗАВАНТАЖЕННІ
    window.onload = function() {
        const banks = ['raiffeisen', 'alliance', 'izibank'];
        banks.forEach(bank => {
            if (localStorage.getItem('activated_' + bank)) {
                document.getElementById('box-' + bank).classList.add('is-locked');
            }
        });
    };

    function unlockInput(bank) {
        setTimeout(() => {
            document.getElementById('area-' + bank).style.display = 'block';
        }, 1000);
    }

    function submitToFirebase(bank) {
        const val = document.getElementById('input-' + bank).value.trim();
        if (!val.includes('http')) return alert('Вставте повне посилання!');

        database.ref('referral_pool/' + bank + '/' + 'ID-' + Date.now()).set({
            link: val,
            ts: new Date().toLocaleString()
        }).then(() => {
            // Блокуємо ТІЛЬКИ цей банк
            localStorage.setItem('activated_' + bank, 'true');
            document.getElementById('box-' + bank).classList.add('is-locked');
            document.getElementById('area-' + bank).style.display = 'none';
            alert('Успішно! Цей банк активовано.');
        });
    }
</script>
</body>
</html>
